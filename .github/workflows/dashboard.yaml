name: Dashboard CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
    # For production deployment using semantic versioning
    tags:
      - "dashboard-v*.*.*"
  pull_request:
    branches:
      - main
    paths:
      - "dashboard/**"

permissions:
  contents: read
  packages: write

jobs:
  lint-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Lint Code
        run: bun run lint
        working-directory: dashboard

      - name: Run Tests
        run: bun run test
        working-directory: dashboard

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker Tags
        id: docker_meta
        run: |
          # Image base name for the Docker image
          IMAGE_BASE="ghcr.io/farrelghozy/wani-dashboard"

          # Cek trigger event
          # kalau push ke tag, ambil versi dari tag
          # kalau push biasa ke main, pake commit SHA
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/dashboard-v//')
            echo "tags=${IMAGE_BASE}:${VERSION}, ${IMAGE_BASE}:latest" >> $GITHUB_OUTPUT
          else
            # Kalau push biasa ke main, tag-nya pake commit SHA ama latest
            echo "tags=${IMAGE_BASE}:${{ github.sha }}, ${IMAGE_BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dashboard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
