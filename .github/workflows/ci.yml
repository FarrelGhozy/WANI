name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wani
          POSTGRES_PASSWORD: wani_secret
          POSTGRES_DB: wani
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @wani/database db:generate

      - name: Push schema
        run: pnpm db:push
        env:
          DATABASE_URL: postgresql://wani:wani_secret@localhost:5432/wani

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://wani:wani_secret@localhost:5432/wani
          JWT_SECRET: test-secret
          OPENROUTER_API_KEY: sk-test
