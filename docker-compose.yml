services:

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${DATABASE_USER}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [wani]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/farrelghozy/wani-api:1.0.9
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME_API}
      WABOT_DATABASE_URL: postgresql://${DATABASE_USER}:${POSTGRES_PASSWORD}@db:5432/${DATABASE_NAME_BOT}
      PORT: ${API_PORT}
      NODE_ENV: production
      API_TOKEN: ${API_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES}
      LLM_API_KEY: ${LLM_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      RATE_LIMIT_SHORT_MAX: ${RATE_LIMIT_SHORT_MAX}
      RATE_LIMIT_SHORT_WINDOW_MS: ${RATE_LIMIT_SHORT_WINDOW_MS}
      RATE_LIMIT_LONG_MAX: ${RATE_LIMIT_LONG_MAX}
      RATE_LIMIT_LONG_WINDOW_MS: ${RATE_LIMIT_LONG_WINDOW_MS}
      MAX_INPUT_CHARS: ${MAX_INPUT_CHARS}
      MAX_REPLY_CHARS: ${MAX_REPLY_CHARS}
      DAILY_LLM_BUDGET: ${DAILY_LLM_BUDGET}
      CLASSIFIER_ENABLED: ${CLASSIFIER_ENABLED}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL}
      JUDGE_ENABLED: ${JUDGE_ENABLED}
      JUDGE_MODEL: ${JUDGE_MODEL}
      GROUNDING_CHECK_ENABLED: ${GROUNDING_CHECK_ENABLED}
      GROUNDING_MODEL: ${GROUNDING_MODEL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    expose:
      - "3001"
    volumes:
      - generated-sites:/app/generated-sites
      - uploads:/app/uploads
    restart: unless-stopped
    networks: [wani]
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: ghcr.io/farrelghozy/wani-dashboard:1.0.10
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_URL: /api
    ports:
      - "5173:80"
    restart: unless-stopped
    networks: [wani]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  wa-bot:
    image: ghcr.io/farrelghozy/wani-wa-bot:1.0.9
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME_BOT}
      API_URL: ${API_URL}
      API_TOKEN: ${API_TOKEN}
      OUTGOING_POLL_INTERVAL: ${OUTGOING_POLL_INTERVAL}
    restart: unless-stopped
    networks: [wani]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Automated daily backup service ──────────────────────────
  backup:
    image: postgres:17-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME_API: ${DATABASE_NAME_API}
      DATABASE_NAME_BOT: ${DATABASE_NAME_BOT}
      BACKUP_DIR: /backups
      RETENTION_DAYS: 7
    volumes:
      - backups:/backups
      - ./scripts/backup-db.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c", "while true; do /backup.sh; sleep 86400; done"]
    restart: unless-stopped
    networks: [wani]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  generated-sites:
  uploads:
  backups:

networks:
  wani:
    driver: bridge
