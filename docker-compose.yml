services:
  postgres:
    image: postgres:16-alpine
    container_name: wani-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: wani
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wani_secret}
      POSTGRES_DB: wani
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wani"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wani-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: wani-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/database:/app/packages/database
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://wani:${DB_PASSWORD:-wani_secret}@postgres:5432/wani
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wani-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: production
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
    container_name: wani-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
      DATABASE_URL: postgresql://wani:${DB_PASSWORD:-wani_secret}@postgres:5432/wani
    depends_on:
      - api
    networks:
      - wani-net

volumes:
  pgdata:

networks:
  wani-net:
    driver: bridge
