<!DOCTYPE html>
<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Produk — {{store.businessName}}</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./assets/tailwind.css" rel="stylesheet" />
<style>:root{ {{color.vars}} }</style>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #faf8ff; }
  ::-webkit-scrollbar-thumb { background: #c3c6d7; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #737686; }
</style>
</head>
<body class="bg-surface text-on-surface font-body-md">

{{>navbar}}

<main>
<section class="py-2xl bg-surface-container-low">
<div class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop">
<div class="text-center max-w-2xl mx-auto mb-xl space-y-sm">
<h1 class="font-headline-md text-headline-md text-on-surface">Produk Kami</h1>
<p class="text-on-surface-variant">Semua produk tersedia dari {{store.businessName}}.</p>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-lg">
{{#products}}
<div class="bg-surface rounded-xl overflow-hidden border border-outline-variant hover:shadow-xl transition-shadow group flex flex-col">
<div class="aspect-square relative overflow-hidden bg-surface-variant">
<div class="w-full h-full flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-on-surface-variant opacity-20">inventory_2</span>
</div>
</div>
<div class="p-md flex-grow flex flex-col">
<div class="flex justify-between items-start mb-sm gap-2">
<h2 class="font-bold text-on-surface text-sm leading-tight">{{.name}}</h2>
<span class="font-label-md text-label-md text-primary whitespace-nowrap">Rp {{.price}}</span>
</div>
<p class="text-xs text-on-surface-variant line-clamp-3">{{.description}}</p>
</div>
</div>
{{/products}}
{{^products}}
<div class="col-span-full text-center py-xl">
<span class="material-symbols-outlined text-6xl text-on-surface-variant opacity-30">inventory_2</span>
<p class="text-on-surface-variant mt-md">Belum ada produk tersedia.</p>
</div>
{{/products}}
</div>
</div>
</section>
</main>

{{>footer}}

</body></html>
