<!-- ============================================================
     CYBERPUNK NAVBAR — Fixed top nav with functional mobile menu
     ============================================================ -->
<nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0f]/85 backdrop-blur-xl border-b border-[#00d4ff]/20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-18">

      <!-- Brand / Logo -->
      <div class="flex-shrink-0">
        <a href="./" class="flex items-center gap-2">
          {{#store.hasLogo}}
          <img src="{{store.logoUrl}}" alt="{{store.name}}" class="h-8 lg:h-9 w-auto" />
          {{/store.hasLogo}}
          {{^store.hasLogo}}
          <span class="text-xl lg:text-2xl font-['Plus_Jakarta_Sans'] font-extrabold tracking-tight text-[#00d4ff] hover:text-[#00e5ff] transition-colors duration-200" style="text-shadow: 0 0 12px rgba(0,212,255,0.4);">
            {{store.name}}
          </span>
          {{/store.hasLogo}}
        </a>
      </div>

      <!-- Desktop Nav Links -->
      <div class="hidden md:flex items-center gap-1 lg:gap-2">
        <a href="./"
           class="px-3 py-2 text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200 rounded
                  {{#page.beranda}}text-[#00d4ff] bg-[#00d4ff]/10 border-b-2 border-[#00d4ff]{{/page.beranda}}
                  {{^page.beranda}}text-[#8888a0] hover:text-[#00d4ff] hover:bg-[#00d4ff]/5{{/page.beranda}}">
          Beranda
        </a>
        <a href="./produk.html"
           class="px-3 py-2 text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200 rounded
                  {{#page.produk}}text-[#b388ff] bg-[#b388ff]/10 border-b-2 border-[#b388ff]{{/page.produk}}
                  {{^page.produk}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.produk}}">
          Produk
        </a>
        <a href="./tentang.html"
           class="px-3 py-2 text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200 rounded
                  {{#page.tentang}}text-[#b388ff] bg-[#b388ff]/10 border-b-2 border-[#b388ff]{{/page.tentang}}
                  {{^page.tentang}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.tentang}}">
          Tentang
        </a>
        <a href="./kontak.html"
           class="px-3 py-2 text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200 rounded
                  {{#page.kontak}}text-[#b388ff] bg-[#b388ff]/10 border-b-2 border-[#b388ff]{{/page.kontak}}
                  {{^page.kontak}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.kontak}}">
          Kontak
        </a>
      </div>

      <!-- Right side: Search + Cart + Mobile Toggle -->
      <div class="flex items-center gap-3">
        <!-- Search (desktop) -->
        <div class="hidden sm:block relative">
          <input type="text" placeholder="Cari produk..."
                 class="w-36 lg:w-48 bg-[#12121a] border border-[#00d4ff]/20 text-[#e8e8f0] text-sm font-['JetBrains_Mono'] px-3 py-1.5 pr-8 rounded focus:outline-none focus:border-[#00d4ff]/60 focus:shadow-[0_0_8px_rgba(0,212,255,0.15)] transition-all duration-200 placeholder:text-[#555568]" />
          <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#00d4ff]/60 text-sm">search</span>
        </div>

        <!-- Cart icon -->
        <button class="p-2 text-[#8888a0] hover:text-[#00d4ff] hover:bg-[#00d4ff]/10 rounded transition-all duration-200 active:scale-95">
          <span class="material-symbols-outlined text-xl">shopping_cart</span>
        </button>

        <!-- Mobile menu toggle -->
        <button onclick="document.getElementById('cyber-mobile-menu').classList.toggle('hidden')"
                class="md:hidden p-2 text-[#8888a0] hover:text-[#00d4ff] hover:bg-[#00d4ff]/10 rounded transition-all duration-200 active:scale-95">
          <span class="material-symbols-outlined text-xl">menu</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="cyber-mobile-menu" class="hidden md:hidden border-t border-[#00d4ff]/10 bg-[#0a0a0f]/95 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-4 py-4 space-y-1">
      <a href="./"
         class="block px-4 py-3 rounded text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200
                {{#page.beranda}}text-[#00d4ff] bg-[#00d4ff]/10 border-l-2 border-[#00d4ff]{{/page.beranda}}
                {{^page.beranda}}text-[#8888a0] hover:text-[#00d4ff] hover:bg-[#00d4ff]/5{{/page.beranda}}">
        <span class="material-symbols-outlined text-sm align-middle mr-2">home</span>Beranda
      </a>
      <a href="./produk.html"
         class="block px-4 py-3 rounded text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200
                {{#page.produk}}text-[#b388ff] bg-[#b388ff]/10 border-l-2 border-[#b388ff]{{/page.produk}}
                {{^page.produk}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.produk}}">
        <span class="material-symbols-outlined text-sm align-middle mr-2">inventory_2</span>Produk
      </a>
      <a href="./tentang.html"
         class="block px-4 py-3 rounded text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200
                {{#page.tentang}}text-[#b388ff] bg-[#b388ff]/10 border-l-2 border-[#b388ff]{{/page.tentang}}
                {{^page.tentang}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.tentang}}">
        <span class="material-symbols-outlined text-sm align-middle mr-2">info</span>Tentang
      </a>
      <a href="./kontak.html"
         class="block px-4 py-3 rounded text-sm font-['Inter'] font-medium tracking-wider uppercase transition-all duration-200
                {{#page.kontak}}text-[#b388ff] bg-[#b388ff]/10 border-l-2 border-[#b388ff]{{/page.kontak}}
                {{^page.kontak}}text-[#8888a0] hover:text-[#b388ff] hover:bg-[#b388ff]/5{{/page.kontak}}">
        <span class="material-symbols-outlined text-sm align-middle mr-2">contact_mail</span>Kontak
      </a>
      <hr class="border-[#00d4ff]/10 my-3" />
      <a href="{{whatsapp.url}}" target="_blank" rel="noopener"
         class="block px-4 py-3 rounded text-sm font-['Inter'] font-medium tracking-wider uppercase text-[#00d4ff] hover:bg-[#00d4ff]/10 transition-all duration-200">
        <span class="material-symbols-outlined text-sm align-middle mr-2">chat</span>Chat WhatsApp
      </a>
      <!-- Mobile search -->
      <div class="relative mt-2 px-1">
        <input type="text" placeholder="Cari produk..."
               class="w-full bg-[#12121a] border border-[#00d4ff]/20 text-[#e8e8f0] text-sm font-['JetBrains_Mono'] px-3 py-2 pr-8 rounded focus:outline-none focus:border-[#00d4ff]/60 transition-all placeholder:text-[#555568]" />
        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#00d4ff]/60 text-sm">search</span>
      </div>
    </div>
  </div>
</nav>
