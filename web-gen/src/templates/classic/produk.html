<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Produk — {{store.name}}</title>
<!-- Google Fonts: Bodoni Moda for headlines, Plus Jakarta Sans for body -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./assets/tailwind.css" rel="stylesheet" />
<style>:root{ {{color.vars}} }</style>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .renaissance-border {
      border: 1px solid rgba(120, 86, 0, 0.2);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">

{{>navbar}}

<main>
<section class="py-xl bg-background">
<div class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop">
<div class="flex justify-between items-end mb-xl border-b border-outline-variant pb-md">
<div>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-xs block">Seasonal Selection</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Produk Kami</h1>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-gutter">
{{#products}}
<div class="group cursor-pointer">
<div class="aspect-[3/4] renaissance-border bg-surface-container-high mb-md overflow-hidden relative">
<img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="{{.name}}" src="{{.imageUrl}}"/>
<div class="absolute inset-0 bg-primary/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-xs">
<span class="bg-surface text-on-surface px-md py-xs font-label-sm text-label-sm uppercase">Quick View</span>
</div>
</div>
<div class="text-center">
<h3 class="font-headline-md text-headline-md text-on-surface text-lg">{{.name}}</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Rp {{.price}}</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">{{.description}}</p>
</div>
</div>
{{/products}}
{{^products}}<p class="text-on-surface-variant text-center col-span-full">Belum ada produk</p>{{/products}}
</div>
</div>
</section>
</main>

{{>footer}}

</body></html>
