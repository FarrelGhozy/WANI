<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Produk — {{store.name}}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=JetBrains+Mono:wght@100..900&amp;family=Plus+Jakarta+Sans:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#38485d",
                    "primary": "{{color.primary}}",
                    "background": "#faf8ff",
                    "primary-container": "#2563eb",
                    "secondary": "{{color.secondary}}",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-primary-fixed": "#00174b",
                    "tertiary": "#784b00",
                    "secondary-container": "#d0e1fb",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#0053db",
                    "on-surface": "#131b2e",
                    "surface-container-low": "#f2f3ff",
                    "tertiary-container": "#996100",
                    "on-surface-variant": "#434655",
                    "on-background": "#131b2e",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface": "#faf8ff",
                    "tertiary-fixed-dim": "#ffb95f",
                    "surface-dim": "#d2d9f4",
                    "outline-variant": "#c3c6d7",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#2a1700",
                    "surface-container": "#eaedff",
                    "on-secondary-container": "#54647a",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary": "#ffffff",
                    "inverse-primary": "#b4c5ff",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#e2e7ff",
                    "surface-bright": "#faf8ff",
                    "secondary-fixed": "#d3e4fe",
                    "on-tertiary-container": "#ffeedd",
                    "surface-variant": "#dae2fd",
                    "primary-fixed": "#dbe1ff",
                    "tertiary-fixed": "#ffddb8",
                    "on-secondary-fixed": "#0b1c30",
                    "error": "#ba1a1a",
                    "inverse-surface": "#283044",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#b7c8e1",
                    "surface-container-highest": "#dae2fd",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#eeefff",
                    "outline": "#737686",
                    "inverse-on-surface": "#eef0ff",
                    "vibrant-orange": "#FF8A00",
                    "vibrant-teal": "#00D1FF",
                    "vibrant-purple": "#AD00FF"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "2xl": "2.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "lg": "24px",
                    "margin-mobile": "16px",
                    "2xl": "64px",
                    "xs": "4px",
                    "sm": "8px",
                    "md": "16px",
                    "margin-desktop": "auto",
                    "xl": "40px",
                    "gutter": "20px",
                    "3xl": "80px"
            },
            "fontFamily": {
                    "display-lg-mobile": ["Plus Jakarta Sans"],
                    "label-sm": ["Inter"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-md": ["JetBrains Mono"],
                    "body-md": ["Inter"],
                    "headline-sm": ["Plus Jakarta Sans"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "800"}],
                    "label-sm": ["12px", {"lineHeight": "1.0", "fontWeight": "600"}],
                    "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "900"}],
                    "headline-md": ["36px", {"lineHeight": "1.2", "fontWeight": "800"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "500"}],
                    "headline-sm": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "1.6", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .bento-shadow {
            box-shadow: 0px 8px 30px rgba(0, 74, 198, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden">

{{>navbar}}

<main>
<section class="py-3xl">
<div class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop">
<div class="text-center mb-2xl">
<h2 class="font-headline-md text-headline-md text-on-surface">Produk Kami</h2>
<div class="flex flex-wrap justify-center gap-sm mt-md">
<button class="px-6 py-2 bg-primary text-white rounded-full font-bold bento-shadow">All Items</button>
<button class="px-6 py-2 bg-neutral-100 hover:bg-neutral-200 rounded-full font-medium transition-colors">TREATS</button>
<button class="px-6 py-2 bg-neutral-100 hover:bg-neutral-200 rounded-full font-medium transition-colors">APPAREL</button>
<button class="px-6 py-2 bg-neutral-100 hover:bg-neutral-200 rounded-full font-medium transition-colors">DECOR</button>
</div>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-lg">
{{#products}}
<div class="group stagger-item">
<div class="aspect-square rounded-2xl overflow-hidden bg-surface-container-high relative mb-md bento-shadow">
<img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="{{.name}}" src="{{.imageUrl}}"/>
<button class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="favorite">favorite</span>
</button>
<div class="absolute bottom-0 inset-x-0 p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
<button class="w-full bg-primary text-white py-2 rounded-xl font-bold flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="add_shopping_cart">add_shopping_cart</span> Add to Cart
                            </button>
</div>
</div>
<h3 class="font-bold text-on-surface">{{.name}}</h3>
<p class="text-on-surface-variant font-label-md text-sm">{{.description}}</p>
<p class="font-black text-vibrant-purple text-lg mt-1">Rp {{.price}}</p>
</div>
{{/products}}
{{^products}}<p class="text-on-surface-variant text-center col-span-full">Belum ada produk</p>{{/products}}
</div>
</div>
</section>
</main>

{{>footer}}

<!-- Mobile Navigation Shell (Conditional) -->
<div class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-lg border-t border-outline-variant px-margin-mobile h-16 flex justify-around items-center">
<button class="flex flex-col items-center text-primary">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[10px] font-bold">Home</span>
</button>
<button class="flex flex-col items-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="category">category</span>
<span class="text-[10px] font-bold">Catalog</span>
</button>
<button class="flex flex-col items-center text-on-surface-variant relative">
<span class="material-symbols-outlined" data-icon="shopping_basket">shopping_basket</span>
<span class="absolute -top-1 -right-1 bg-vibrant-orange text-[8px] text-white w-4 h-4 rounded-full flex items-center justify-center">2</span>
<span class="text-[10px] font-bold">Cart</span>
</button>
<button class="flex flex-col items-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-bold">Profile</span>
</button>
</div>
<!-- Floating FAB -->
<a href="{{whatsapp.url}}" target="_blank" rel="noopener" class="fixed bottom-24 right-6 w-14 h-14 bg-vibrant-teal text-white rounded-full bento-shadow flex items-center justify-center hover:scale-110 active:scale-95 transition-transform z-40">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</a>
</body></html>
