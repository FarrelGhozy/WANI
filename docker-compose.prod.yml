services:
  traefik:
    image: traefik:v3.1
    container_name: wani-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-data:/etc/traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
    networks:
      - wani-prod

  postgres:
    image: postgres:16-alpine
    container_name: wani-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: wani
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: wani
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wani"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wani-prod

  api:
    image: ghcr.io/farrelghozy/wani-api:latest
    container_name: wani-api
    restart: unless-stopped
    expose:
      - "3001"
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wani:${DB_PASSWORD:?DB_PASSWORD required}@postgres:5432/wani
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
      - "traefik.http.routers.api.rule=Host(`${API_HOST:-api.wani.local}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
    networks:
      - wani-prod

  web:
    image: ghcr.io/farrelghozy/wani-web:latest
    container_name: wani-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://wani:${DB_PASSWORD:?DB_PASSWORD required}@postgres:5432/wani
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.routers.web.rule=Host(`${WEB_HOST:-wani.local}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
    networks:
      - wani-prod

volumes:
  pgdata:
  traefik-data:

networks:
  wani-prod:
    driver: bridge
